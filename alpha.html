<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
    
    <link rel="stylesheet" href="alpha.css">
    <script src="alpha.js"></script>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="heading">ENGAGEMENT RATE CALCULATOR</h1>
             <p class="subtext">Measure how well your audience interacts with your content</p>
            <form>
                <div class="media-info">
                    <p>Followers</p>
                    <div class="followers">
                        <i class="fa-regular fa-user"></i>
                        <input type="number" placeholder="e.g. 10,000" required>
                    </div>

                    <p>Comments</p>
                    <div class="comments">
                        <i class="fa-regular fa-comment"></i>
                        <input type="number" placeholder="e.g. 850" required>
                    </div>

                    <p>Likes</p>
                    <div class="likes">
                        <i class="fa-regular fa-thumbs-up"></i>
                        <input type="number" placeholder="e.g. 120" required>
                    </div>
                </div>
                <button>Calculate</button>

            </form>
        </div>
    </div>
</body>

</html>
